<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get in Touch</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600&display=swap">
  <link rel="stylesheet" href="/styles.css">
</head>
    <header class="contact-header" >
      <img class="logo" src="/assets/images/logo-transparent.png">
         <h1>Get in Touch</h1>
    </header>
<body>
  <div class="formbox"> 
    <form >
      <div class="form-element">
        <Label>Name</Label>
        <input type="text" name="name" required>
      </div>

      <div class="form-element">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>

      <div class="form-element">
        <label>Subject</label>
        <input type="text" name="subject" required>
      </div>
    
      <div class="form-element">
        <label>Message</label>
        <textarea name="message" rows="25" required></textarea>
      </div>

      <button class="btn" type="submit">Send Message</button>
    </form>
  </div>


 

</body>
    <footer>
        © 2026 Jane Lord counselling, all rights reserved
    </footer>
</html>
